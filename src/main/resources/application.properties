spring.application.name=smart-city-backend
server.port=8081

# Default (dev) DB: H2 in-memory
spring.datasource.url=jdbc:h2:mem:smartcity;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=change-me-to-a-long-random-secret-change-me
app.jwt.issuer=smart-city
app.jwt.accessTokenMinutes=1440

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui

